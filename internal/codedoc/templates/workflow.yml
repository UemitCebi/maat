name: CodeDoc

# Validates that documentation stayed in sync with code on every pull request.
on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Build codedoc
        # CodeDoc is a single static Go binary. This builds it from a vendored
        # copy under ./cmd/codedoc. If you obtain the binary another way
        # (released artifact, module install), replace this step accordingly.
        run: go build -o "$RUNNER_TEMP/codedoc" ./cmd/codedoc
      - name: Run codedoc check
        run: '"$RUNNER_TEMP/codedoc" check --format github'
